# Render Blueprint for AidWatch API
# Deploy: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aidwatch-api
    runtime: node
    region: oregon
    plan: free
    rootDir: packages/api
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run db:migrate:prod && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Transaction pooler from Supabase (port 6543)
      - key: DIRECT_URL
        sync: false  # Direct connection from Supabase (port 5432) - for migrations
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_URL
        sync: false  # Your Vercel frontend URL
      - key: API_URL
        fromService:
          type: web
          name: aidwatch-api
          property: host
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: "false"
      - key: AI_ANALYSIS_INTERVAL_MINUTES
        value: "30"
      - key: AI_BATCH_SIZE
        value: "5"
      - key: AI_DELAY_BETWEEN_CALLS_MS
        value: "2000"
